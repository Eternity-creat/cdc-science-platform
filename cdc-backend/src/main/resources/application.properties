# 应用配置
spring.application.name=cdc-backend

# 服务端口
server.port=${SERVER_PORT:8080}

# ── 数据库配置 ──
# 通过环境变量覆盖，本地开发使用默认值，部署时通过 .env 或 Docker 注入
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cdc_knowledge?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis 配置
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.cdc.cdcbackend.entity

# ── Agent 服务配置 ──
agent.service.url=${AGENT_SERVICE_URL:http://localhost:8001}
agent.service.timeout=${AGENT_SERVICE_TIMEOUT:60000}

# ── DashScope 兜底默认值 ──
# 以下配置仅在 cdc_llm_config 表中没有对应类型的默认配置时生效。
# 正式使用时请通过前端「LLM 配置」页面管理各类型模型，修改这里的值不会影响运行。
dashscope.api-key=${DASHSCOPE_API_KEY:}
dashscope.embedding-model=${EMBEDDING_MODEL:text-embedding-v2}
dashscope.base-url=${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}

# ── 错误详情输出（生产环境请用 application-prod.properties 覆盖） ──
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always
spring.web.error.include-exception=true
spring.web.error.include-binding-errors=always

# MyBatis 驼峰映射
mybatis.configuration.map-underscore-to-camel-case=true
